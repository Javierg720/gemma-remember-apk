name: Build iOS IPA (unsigned, for sideloading)

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm deps
        run: npm install

      - name: Pin Capacitor SPM to 8.0.0 in TTS plugin
        run: |
          sed -i.bak 's|from: "8.0.0"|exact: "8.0.0"|g' \
            node_modules/@capacitor-community/text-to-speech/Package.swift
          cat node_modules/@capacitor-community/text-to-speech/Package.swift

      - name: Add iOS platform
        run: npx cap add ios || echo "iOS platform already exists"

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Inspect iOS project layout
        run: |
          ls -la ios/App
          find ios/App -maxdepth 2 -name "*.xcworkspace" -o -name "*.xcodeproj" -o -name "Package.swift" -o -name "Podfile"

      - name: Build unsigned .app (Capacitor 8 / SPM)
        run: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then
            BUILD_TARGET="-workspace App.xcworkspace"
          else
            BUILD_TARGET="-project App.xcodeproj"
          fi
          xcodebuild \
            $BUILD_TARGET \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package as .ipa (unsigned)
        run: |
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          mv App.app Payload/
          zip -r GemmaRemember-unsigned.ipa Payload
          ls -la

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemma-remember-ios-unsigned
          path: ios/App/build/Build/Products/Release-iphoneos/GemmaRemember-unsigned.ipa
          retention-days: 30
