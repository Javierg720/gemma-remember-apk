<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Gemma Remember</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</head>
<body>
  <div id="app">

    <!-- SPLASH -->
    <div id="splash" class="screen active">
      <div class="splash-inner">
        <svg class="gemma-logo" width="120" height="120" viewBox="0 0 168 168" fill="none"><circle cx="84" cy="84" r="56" stroke="#4285F4" stroke-opacity="0.4" stroke-width="2"/><line x1="84" y1="8" x2="84" y2="160" stroke="#4285F4" stroke-opacity="0.3" stroke-width="1.5"/><line x1="8" y1="84" x2="160" y2="84" stroke="#4285F4" stroke-opacity="0.3" stroke-width="1.5"/><line x1="28" y1="28" x2="140" y2="140" stroke="#4285F4" stroke-opacity="0.2" stroke-width="1.5"/><line x1="28" y1="140" x2="140" y2="28" stroke="#4285F4" stroke-opacity="0.2" stroke-width="1.5"/><path d="M84 28C84 58.93 109.07 84 140 84C109.07 84 84 109.07 84 140C84 109.07 58.93 84 28 84C58.93 84 84 58.93 84 28Z" fill="#4285F4"/></svg>
        <h1 class="splash-title">Gemma Remember</h1>
        <p class="splash-sub">Helping you remember the people who love you</p>
        <button class="btn-ghost" onclick="getStarted()">Get Started</button>
        <p class="splash-powered">Powered by Gemma 4</p>
      </div>
    </div>

    <!-- SETUP -->
    <div id="setup" class="screen">
      <div class="splash-inner">
        <svg class="gemma-logo" width="80" height="80" viewBox="0 0 168 168" fill="none"><circle cx="84" cy="84" r="56" stroke="#4285F4" stroke-opacity="0.4" stroke-width="2"/><line x1="84" y1="8" x2="84" y2="160" stroke="#4285F4" stroke-opacity="0.3" stroke-width="1.5"/><line x1="8" y1="84" x2="160" y2="84" stroke="#4285F4" stroke-opacity="0.3" stroke-width="1.5"/><path d="M84 28C84 58.93 109.07 84 140 84C109.07 84 84 109.07 84 140C84 109.07 58.93 84 28 84C58.93 84 84 58.93 84 28Z" fill="#4285F4"/></svg>
        <h1 class="splash-title" style="font-size:1.5rem">One-Time Setup</h1>
        <div id="modeCards" class="mode-cards">
          <button class="mode-card" onclick="pickMode('api')">
            <div class="mode-icon">&#9729;</div>
            <div class="mode-info">
              <div class="mode-title">Cloud (Recommended)</div>
              <div class="mode-desc">Uses Gemini API. Fast, no download.</div>
            </div>
          </button>
          <button class="mode-card" onclick="pickMode('local')">
            <div class="mode-icon">&#9741;</div>
            <div class="mode-info">
              <div class="mode-title">On-Device</div>
              <div class="mode-desc">Downloads Gemma 4 (2.6 GB). Works offline.</div>
            </div>
          </button>
        </div>
        <div id="apiSetup" class="setup-form" style="display:none">
          <input type="text" id="apiKeyInput" class="chat-input-field" placeholder="Gemini API key" autocomplete="off">
          <p class="hint">Free from <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a></p>
          <button class="btn-primary" onclick="saveApiKey()">Continue</button>
        </div>
      </div>
    </div>

    <!-- NAME SCREEN REMOVED — Gemma asks in chat -->

    <!-- CHAT -->
    <div id="chatScreen" class="screen">
      <header class="chat-header">
        <div class="chat-header-left">
          <svg width="32" height="32" viewBox="0 0 168 168" fill="none"><circle cx="84" cy="84" r="56" stroke="#4285F4" stroke-opacity="0.4" stroke-width="3"/><path d="M84 28C84 58.93 109.07 84 140 84C109.07 84 84 109.07 84 140C84 109.07 58.93 84 28 84C58.93 84 84 58.93 84 28Z" fill="#4285F4"/></svg>
          <div>
            <div class="chat-header-name">Gemma</div>
            <div class="chat-header-status" id="chatStatus">Your memory companion</div>
          </div>
        </div>
        <div class="chat-header-right">
          <button class="icon-btn" onclick="openReminders()" title="Reminders">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          </button>
          <button class="icon-btn" onclick="openHistory()" title="History">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
          <button class="icon-btn" onclick="toggleTTS()" id="ttsBtn" title="Voice">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
          </button>
          <button class="icon-btn voice-mode-btn" onclick="enterVoiceMode()" title="Voice mode">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
          </button>
        </div>
      </header>

      <!-- History Panel -->
      <div id="historyPanel" class="history-panel" style="display:none">
        <div class="history-header">
          <h2>Conversation History</h2>
          <button class="icon-btn" onclick="closeHistory()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="history-actions">
          <button class="history-action-btn" onclick="summarizeHistory()">Summarize all conversations</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div id="photoPreview" class="photo-preview" style="display:none">
        <img id="previewImg">
        <button class="photo-remove" onclick="clearPhoto()">&#10005;</button>
      </div>

      <div class="chat-input-bar">
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">

        <!-- Tools row above text input -->
        <div class="chat-input-tools">
          <button class="input-icon" onclick="document.getElementById('cameraInput').click()" title="Take photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </button>
          <button class="input-icon" onclick="document.getElementById('fileInput').click()" title="Photo from gallery">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </button>
          <button class="input-icon" onclick="shareLocation()" title="Share location">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </button>
          <button class="input-icon" id="chatMicBtn" onclick="toggleChatMic()" title="Tap and speak">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
          </button>
        </div>

        <!-- Text input row -->
        <div class="chat-input-row">
          <input type="text" id="msgInput" class="chat-input-field" placeholder="Type or tap the mic..." autocomplete="off">
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- VOICE MODE -->
    <div id="voiceMode" class="screen">
      <div class="voice-mode-inner">
        <iframe id="vizFrame" src="visualizer.html" style="width:100%;height:60vh;border:none;border-radius:16px;pointer-events:none;"></iframe>
        <div class="voice-partial" id="voicePartial"></div>
        <div class="voice-status" id="voiceStatus">Tap to talk</div>
        <button class="voice-close" onclick="exitVoiceMode()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
